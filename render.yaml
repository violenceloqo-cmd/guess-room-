# Render Blueprint for the Room Royale backend (the always-on game engine).
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
#
# IMPORTANT:
#  - Use a paid plan (Starter+). The Free plan SLEEPS after ~15 min idle, which
#    would freeze the round loop and stop payouts. The engine must run 24/7.
#  - Keep numInstances at 1. The engine holds authoritative round state in
#    memory; a second instance would run a parallel game.
#  - Secrets (sync:false) are entered in the Render dashboard, never committed.
services:
  - type: web
    name: room-royale-backend
    runtime: node
    plan: starter
    region: oregon
    numInstances: 1
    healthCheckPath: /health
    buildCommand: npm install && npm run build:shared && npm run build --workspace @room-royale/backend
    startCommand: node packages/backend/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SOLANA_CLUSTER
        value: mainnet-beta
      - key: TOKEN_MIN_HOLD
        value: "100000"
      - key: ROUND_POOL_SOL
        value: "0.5"
      - key: ROUND_DURATION_SECONDS
        value: "60"
      - key: ROUND_LOCK_BUFFER_SECONDS
        value: "3"
      - key: ELIMINATION_INTERVAL_SECONDS
        value: "10"
      - key: ROLLOVER_ON_NO_WINNER
        value: "false"
      - key: MAX_PAYOUT_SOL
        value: "5"
      - key: MAX_ROUND_PAYOUT_SOL
        value: "10"
      - key: DRY_RUN
        value: "false"
      # --- Secrets: set these in the Render dashboard (Environment tab) ---
      - key: SOLANA_RPC_URL
        sync: false
      - key: TOKEN_MINT
        sync: false
      - key: HOT_WALLET_SECRET
        sync: false
      - key: HOST_API_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
